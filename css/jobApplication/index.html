<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <form action="">
            <label for="name">Full Name: </label>
            <input type="text" id="name" required>

            <label for="email">Email: </label>
            <input type="email" name="" id="email" required>

            <label for="position">Position: </label>
            <select name="" id="position" required>
                <option value="">Select a position</option>
                <option value="developer">Developer</option>
                <option value="designer">Designer</option>
                <option value="manager">Manager</option>
            </select>
            <fieldset class="radio-group">
                <legend>Availability: </legend>

                <input type="radio" name="availability" id="full-time" value="full-time">
                <label for="full-time">Full-Time</label>

                <input type="radio" name="availability" id="part-time" value="part-time">
                <label for="part-time">Part-Time</label>

            </fieldset>
            <label for="message">Message: </label>
            <textarea name="" id="message" required></textarea>

            <button type="submit">Submit Application</button>


        </form>
    </div>

</body>

</html>
