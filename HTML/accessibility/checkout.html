<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
</head>

<body>
    <h1>Checkout</h1>

    <section>
        <h2>Your Cart</h2>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="cube" srcset="">
    </section>
    <section>
        <h2>Payment Information</h2>
        <form action="">
            <input type="text" id="card-name" name="card-name" required>
            <label for="card-name"><span aria-hidden="true">*</span></label>

            <input type="text" id="card-number" name="card-number" required aria-describedby="card-number-help">
            <p id="card-number-help">Lorem ipsum dolor sit amet consectetur
                adipisicing elit. Atque voluptatem commodi doloremque.</p>
            <label for="card-number"><span aria-hidden="true">*</span></label>

        </form>
    </section>

</body>

</html>
